name: CI

on:
  push:
    branches: [main]
    tags: ['deploy']
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  # ─── Fast lane: frontend checks + unit tests ───
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install (frontend)
        working-directory: src/YobaLog.Web
        run: bun install --frozen-lockfile

      - name: English-only (user-facing files, spec §9)
        run: |
          set -e
          if grep -RPn '[^\x00-\x7F]' \
              src/YobaLog.Web/ts \
              src/YobaLog.Web/Pages \
              src/YobaLog.Web/EventRowViewModel.cs \
              src/YobaLog.Web/EqNeChipsModel.cs \
              src/YobaLog.Web/PropertyKeyContext.cs \
              2>/dev/null; then
            echo "::error::Non-ASCII characters in user-facing files. English-only until i18n scaffold lands (spec §9)."
            exit 1
          fi

      - name: Biome check
        working-directory: src/YobaLog.Web
        run: bun run lint

      - name: TypeScript typecheck
        working-directory: src/YobaLog.Web
        run: bun run typecheck

      - name: Dotnet format verify
        run: |
          dotnet restore YobaLog.slnx
          dotnet format YobaLog.slnx --verify-no-changes --no-restore

      - name: Cake test target
        run: |
          chmod +x ./build.sh
          ./build.sh --target=Test

  # ─── Slow lane: Playwright E2E ───
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install (frontend)
        working-directory: src/YobaLog.Web
        run: bun install --frozen-lockfile

      - name: Cake build (produces playwright.ps1 in the test bin)
        run: |
          chmod +x ./build.sh
          ./build.sh --target=Build

      - name: Install Playwright browsers
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Recurse -Filter playwright.ps1 -Path tests/YobaLog.E2ETests/bin | Select-Object -First 1
          if (-not $installer) { throw "playwright.ps1 not found — Build target did not produce it" }
          & $installer.FullName install chromium --with-deps

      - name: Cake E2ETest target
        run: ./build.sh --target=E2ETest

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/YobaLog.E2ETests/bin/**/artifacts/*.zip
          if-no-files-found: ignore

  # ─── Docker build + push to ghcr.io (main pushes + deploy tag) ───
  publish:
    if: github.event_name == 'push'
    needs: [test, e2e]
    runs-on: ubuntu-latest
    outputs:
      dockerTag: ${{ steps.publish.outputs.dockerTag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cake DockerPush (build + smoke + push)
        id: publish
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          TAG_FILE="$RUNNER_TEMP/docker-tag.txt"
          ./build.sh --target=DockerPush --dockerPush=true --ghcrRepository=${{ github.repository }} --dockerTagOutput="$TAG_FILE"
          echo "dockerTag=$(cat "$TAG_FILE")" >> "$GITHUB_OUTPUT"

  # ─── Deploy via SSH (only on manual `deploy` tag push) ───
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -euo pipefail
            IMAGE="ghcr.io/${{ github.repository }}/yobalog-web:${{ needs.publish.outputs.dockerTag }}"
            CONTAINER_NAME="yobalog-web"
            PASSWORD="${{ secrets.DEPLOY_PASSWORD }}"
            GHCR_USERNAME="${{ secrets.GHCR_DEPLOY_USERNAME }}"
            GHCR_TOKEN="${{ secrets.GHCR_DEPLOY_TOKEN }}"
            run_sudo() { printf '%s\n' "$PASSWORD" | sudo -S -p '' "$@"; }
            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
              run_sudo bash -c 'printf "%s\n" "$2" | docker login ghcr.io -u "$1" --password-stdin' -- "$GHCR_USERNAME" "$GHCR_TOKEN"
            else
              echo "GHCR_DEPLOY_USERNAME/GHCR_DEPLOY_TOKEN secrets are required for docker login" >&2
              exit 1
            fi
            run_sudo docker pull "$IMAGE"
            run_sudo docker stop "$CONTAINER_NAME" || true
            run_sudo docker rm "$CONTAINER_NAME" || true
            run_sudo mkdir -p /opt/yobalog/data
            run_sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 127.0.0.1:8080:8080 \
              -v /opt/yobalog/data:/app/data \
              -e Admin__Username="${{ secrets.YOBALOG_ADMIN_USERNAME }}" \
              -e Admin__Password="${{ secrets.YOBALOG_ADMIN_PASSWORD }}" \
              "$IMAGE"
            run_sudo docker system prune -a -f
